# Site settings
locale: "en-US"
title: "Athithyaa's Lair"
title_separator: "-"
name: "Athithyaa Muthuraman"
masthead_title: "Athithyaa Muthuraman"
description: "Personal site of athithyaa muthuraman — projects, writing, and resume."
url: "https://athithyaam.github.io"
baseurl: ""
repository: "athithyaam/athithyaam.github.io"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-sitemap

include:
  - _pages

# Author
author:
  name: "Athithyaa Muthuraman"
  avatar: "/assets/images/panda-avatar.svg"
  bio: "Building things and writing about it, one project at a time."
  location: "Dallas, TX"
  email: "athithyaa2002@gmail.com"
  linkedin: "athithyaa-muthuraman"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/athithyaam"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/athithyaam"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Reading Files
words_per_minute: 200

# Outputting
permalink: /:categories/:title/
timezone: America/New_York
