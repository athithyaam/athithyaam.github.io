{% if page.categories %}
<div class="reading-progress" id="reading-progress" aria-hidden="true">
  <div class="reading-progress__track">
    <div class="reading-progress__fill" id="reading-progress-fill"></div>
    <span class="reading-progress__panda" id="reading-progress-panda">🐼</span>
  </div>
</div>
<script>
  (function () {
    var fill = document.getElementById('reading-progress-fill');
    var panda = document.getElementById('reading-progress-panda');
    if (!fill || !panda) return;

    function update() {
      var doc = document.documentElement;
      var scrollTop = doc.scrollTop || document.body.scrollTop;
      var scrollable = (doc.scrollHeight || document.body.scrollHeight) - doc.clientHeight;
      var progress = scrollable > 0 ? Math.min(100, Math.max(0, (scrollTop / scrollable) * 100)) : 0;
      fill.style.width = progress + '%';
      panda.style.left = progress + '%';
    }

    update();
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
  })();
</script>
{% endif %}
<div id="panda-peek" class="panda-peek">
  <img src="{{ '/assets/images/panda-peek.svg' | relative_url }}" alt="a shy panda waving hello">
</div>
<script>
  (function () {
    var panda = document.getElementById('panda-peek');
    var corners = ['panda-peek--bottom-right', 'panda-peek--bottom-left', 'panda-peek--top-right', 'panda-peek--top-left'];
    var lastCorner = null;

    function pickCorner() {
      var choices = corners.filter(function (c) { return c !== lastCorner; });
      var corner = choices[Math.floor(Math.random() * choices.length)];
      lastCorner = corner;
      return corner;
    }

    function peek() {
      corners.forEach(function (c) { panda.classList.remove(c); });
      panda.classList.remove('panda-peek--visible');
      panda.classList.add(pickCorner());
      void panda.offsetWidth; // force layout so the new hidden position applies before animating in
      panda.classList.add('panda-peek--visible');
      setTimeout(function () { panda.classList.remove('panda-peek--visible'); }, 5000);
    }

    setInterval(peek, 10000); // first peek at 10s — nothing shows on initial load
  })();
</script>
